<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./styles.css">
    <title>Title</title>
</head>
<body>
<div class="header">
    <div class="logo">
        <i class="fa logo-shopping-cart">&#xf07a;</i>
        <h1 class="name-shop">FakeStore</h1>
    </div>
    <div class="search-box">
        <i class="fa search-logo">&#xf002;</i>
        <input type="text" placeholder="Search for products...">
    </div>
    <div class="fa shopping-cart count-shopping-cart">&#xf07a;</div>
</div>
<div class="container">
    <div class="sidebar">
        <h3><i style="font-size:1.4rem; margin-right: 0.4rem" class="fa">&#xf0b0;</i>Categories</h3>
        <ul>
            <li class="all-products">All products</li>
        </ul>
    </div>
    <div class="content">
        <div class="content-header">
            <h2>All product</h2>
        </div>
        <div class="products-list"></div>
    </div>
</div>
</body>
<script src="./main.js"></script>
</html>
